# Sveltia CMS configuration (Decap CMS compatible)
# No OAuth relay server is used. On the login screen, each editor chooses
# "Sign In with Token" and signs in with their own GitHub Personal Access Token
# (with write access to this repo).
# If one-click login is ever wanted, deploy an OAuth relay and add base_url here.
backend:
  name: github
  repo: mdl-lab/mdl-site
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# ---- The collections below are placeholders. Adjust freely to fit the site design ----
collections:
  - name: news
    label: "News"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: publications
    label: "Publications"
    folder: "content/publications"
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Authors", name: "authors", widget: "string" }
      - { label: "Venue (conference / journal)", name: "venue", widget: "string" }
      - { label: "Year", name: "year", widget: "number", value_type: "int" }
      - { label: "URL / DOI", name: "url", widget: "string", required: false }
