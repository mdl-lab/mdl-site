# Decap CMS 設定
# 認証は kpro と共用の OAuth 中継(tamagotake 上の kpro-oauth コンテナ)を利用。
# 中継の実体: https://kpro.mdl.comp.isct.ac.jp/oauth/ → 127.0.0.1:8091 (/opt/kpro-oauth/server.js)
backend:
  name: github
  repo: mdl-lab/mdl-site
  branch: main
  base_url: https://kpro.mdl.comp.isct.ac.jp
  auth_endpoint: oauth/auth

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# ---- 以下のコレクションはプレースホルダ。サイト設計に合わせて自由に変更してください ----
collections:
  - name: news
    label: "ニュース・新着情報"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "日付", name: "date", widget: "datetime" }
      - { label: "本文", name: "body", widget: "markdown", required: false }

  - name: publications
    label: "論文リスト"
    folder: "content/publications"
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "著者", name: "authors", widget: "string" }
      - { label: "発表先(会議・論文誌)", name: "venue", widget: "string" }
      - { label: "年", name: "year", widget: "number", value_type: "int" }
      - { label: "URL / DOI", name: "url", widget: "string", required: false }
