# For tamagotake: Basic-auth protected staging
# Serves a checkout of this repository directly with nginx. See README.md in this directory.
services:
  mdl-staging:
    image: nginx:alpine
    container_name: mdl-staging
    restart: unless-stopped
    # Bound to host 127.0.0.1:8095 only. Exposed externally via the host nginx reverse proxy.
    ports:
      - "127.0.0.1:8095:80"
    volumes:
      - ../..:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./htpasswd:/etc/nginx/htpasswd:ro
