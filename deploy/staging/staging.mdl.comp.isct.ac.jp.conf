# Host-side nginx server block (place in /etc/nginx/sites-available/ on tamagotake)
# HTTP-only state before running certbot --nginx; certbot will add the 443 config.
server {
    listen 80;
    listen [::]:80;
    server_name staging.mdl.comp.isct.ac.jp;

    location / {
        proxy_pass http://127.0.0.1:8095;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
