server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Basic auth for the whole site (same pattern as kpro)
    auth_basic "MDL staging";
    auth_basic_user_file /etc/nginx/htpasswd;

    location /healthz {
        auth_basic off;
        return 200 "ok\n";
    }
}
